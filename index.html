<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar-w: 280px;
  --bg-dark: #f5f0e8;
  --bg-darker: #ffffff;
  --bg-light: #f5f0e8;
  --bg-card: #faf7f2;
  --accent: #c8a96e;
  --accent-dim: #9a7d4e;
  --text-main: #2a2520;
  --text-muted: #8a7f72;
  --text-faint: #b8ad9e;
  --border: #e2d9cc;
  --border-dark: #ddd6ca;
  --sidebar-text: #2a2520;
  --sidebar-muted: #9a8f82;
  --sidebar-hover: #f5f0e8;
  --sidebar-active: #e8e3da;
  --danger: #c0392b;
  --radius: 8px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  display: flex;
  height: 100vh;
}


/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  background: var(--bg-darker);
  border-right: 1px solid var(--border-dark);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
/* ── Sidebar resizer ───────────────────────────────────────── */
#sidebar-resizer {
  flex: 0 0 5px;
  width: 5px;
  cursor: col-resize;
  background: transparent;
  position: relative;
  z-index: 10;
  transition: background 0.15s ease;
  user-select: none;
}
#sidebar-resizer::before {
  content: '';
  position: absolute;
  left: -2px;
  right: -2px;
  top: 0;
  bottom: 0;
}
#sidebar-resizer:hover,
#sidebar-resizer.dragging {
  background: var(--accent-dim);
}
body.resizing { cursor: col-resize !important; user-select: none; }
body.resizing * { cursor: col-resize !important; user-select: none !important; }
.sidebar-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-dark);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.brand-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 0.5px;
  line-height: 1.2;
}
.brand-sub {
  font-size: 10px;
  color: var(--sidebar-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 3px;
}
.sidebar-search {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-bottom: 1px solid var(--border-dark);
}
.search-wrap {
  display: flex;
  align-items: center;
  background: #f0ede8;
  border: 1px solid var(--border-dark);
  border-radius: 6px;
  padding: 0 10px;
  gap: 7px;
}
.search-icon { color: var(--sidebar-muted); flex-shrink: 0; display: block; }
#search-input,
#report-search-input {
  background: transparent !important;
  -webkit-appearance: none;
  appearance: none;
  border: none;
  outline: none;
  color: var(--sidebar-text);
  font-size: 12px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  width: 100%;
  padding: 8px 0;
}
#search-input::placeholder,
#report-search-input::placeholder { color: var(--sidebar-muted); }

.folder-tabs {
  border-bottom: 1px solid var(--border-dark);
  padding: 6px 8px 10px;
  max-height: 260px;
  overflow-y: auto;
}
.folder-tabs::-webkit-scrollbar { width: 4px; }
.folder-tabs::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
.folder-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--sidebar-text);
  transition: background 0.12s;
  margin-bottom: 1px;
}
.folder-tab:hover { background: var(--sidebar-hover); }
.folder-tab.active {
  background: var(--sidebar-active);
  color: var(--accent);
}
.folder-tab-icon { font-size: 13px; opacity: 0.85; }
.folder-tab-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.folder-tab-count {
  font-size: 10px;
  color: var(--sidebar-muted);
  background: #ede8df;
  padding: 1px 7px;
  border-radius: 10px;
}
.folder-tab.active .folder-tab-count {
  background: rgba(200,169,110,0.18);
  color: var(--accent);
}
.folder-tab-delete {
  display: none;
  background: none;
  border: none;
  color: var(--sidebar-muted);
  cursor: pointer;
  font-size: 12px;
  padding: 0 2px;
  margin-left: 2px;
}
.folder-tab:hover .folder-tab-delete { display: inline-block; }
.folder-tab-delete:hover { color: var(--danger); }
.btn-new-folder {
  width: 100%;
  background: transparent;
  color: var(--sidebar-muted);
  border: 1px dashed var(--border-dark);
  border-radius: 6px;
  padding: 7px 0;
  font-size: 11px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  cursor: pointer;
  margin-top: 6px;
}
.btn-new-folder:hover { color: var(--accent); border-color: var(--accent-dim); }

.sidebar-actions {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-dark);
}
.btn-new {
  width: 100%;
  background: var(--accent);
  color: #1a1510;
  border: none;
  border-radius: 6px;
  padding: 9px 0;
  font-size: 12px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  cursor: pointer;
}
.btn-new:hover { background: #d9bc82; }
.btn-new:active { transform: scale(0.98); }
.sidebar-list-header {
  padding: 10px 14px 4px;
  font-size: 10px;
  color: var(--sidebar-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
#article-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 16px;
}
#article-list::-webkit-scrollbar { width: 4px; }
#article-list::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
.list-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  margin-bottom: 1px;
  border: 1px solid transparent;
}
.list-item:hover { background: var(--sidebar-hover); }
.list-item.active {
  background: var(--sidebar-active);
  border-color: var(--border-dark);
}
.li-title {
  font-size: 13px;
  color: var(--sidebar-text);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.list-item.active .li-title { color: var(--accent); }
.li-meta {
  font-size: 10px;
  color: var(--sidebar-muted);
  margin-top: 3px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border-dark);
}
.btn-export {
  width: 100%;
  background: transparent;
  color: var(--sidebar-muted);
  border: 1px solid var(--border-dark);
  border-radius: 6px;
  padding: 8px 0;
  font-size: 11px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.btn-export:hover { color: var(--sidebar-text); border-color: #3e3b35; }
.empty-list {
  padding: 24px 12px;
  text-align: center;
  color: var(--sidebar-muted);
  font-size: 12px;
  line-height: 1.8;
}

#main {
  flex: 1;
  background: var(--bg-light);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
#content-area {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#welcome-screen {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#article-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  padding: 40px 48px 0;
}
.article-toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
}
.article-scroll-body {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 40px;
  padding-right: 6px;
}
.article-scroll-body::-webkit-scrollbar { width: 5px; }
.article-scroll-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#article-form {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
}
#article-form::-webkit-scrollbar { width: 5px; }
#article-form::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.welcome-icon { font-size: 48px; opacity: 0.25; margin-bottom: 10px; }
.welcome-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text-muted); margin-bottom: 5px;}
.welcome-sub { font-size: 13px; color: var(--text-faint); }

/* ── Article View ─────────────────────────────────────── */
.btn-edit, .btn-delete {
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 14px;
  font-size: 12px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.12s;
}
.btn-edit:hover { border-color: var(--accent); color: var(--accent-dim); }
.btn-delete:hover { border-color: var(--danger); color: var(--danger); }
.article-meta-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.meta-item { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; }
.meta-value { font-size: 14px; color: var(--text-main); font-weight: 500; }
.article-title-display {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  color: var(--text-main);
  line-height: 1.3;
  margin-bottom: 24px;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}
.article-content-display {
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  font-size: 15px;
  color: #3a342c;
  line-height: 1.9;
  max-width: 680px;
}
#view-image {
  max-width: 680px;
  width: 100%;
  border-radius: 8px;
  margin-bottom: 24px;
  display: none;
  border: 1px solid var(--border);
}

/* ── Form ─────────────────────────────────────────────── */
.form-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--text-main);
  margin-bottom: 28px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
  max-width: 680px;
}
.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
  max-width: 680px;
}
.form-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.form-field input[type="text"], 
.form-field input[type="date"], 
.form-field textarea {
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  font-size: 14px;
  color: var(--text-main);
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}
.form-field input:focus, .form-field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
}
.form-field textarea {
  min-height: 240px;
  resize: vertical;
  line-height: 1.8;
}
.image-upload-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
}
.image-upload-wrapper input[type="file"] {
  font-size: 12px;
}
.btn-remove-img {
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
  display: none;
}
#form-image-preview {
  max-width: 200px;
  border-radius: 6px;
  margin-top: 10px;
  display: none;
  border: 1px solid var(--border);
}
.upload-hint {
  font-size: 11px;
  color: var(--text-muted);
}
.image-thumb-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.image-thumb-grid:empty { display: none; }
.thumb-card {
  position: relative;
  width: 100px;
  height: 100px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: #f5f1e8;
}
.thumb-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.thumb-card .x {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  border-radius: 999px;
  background: rgba(0,0,0,.65);
  color: white;
  border: none;
  font-size: 13px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  display: grid;
  place-items: center;
}
.thumb-card .x:hover { background: rgba(0,0,0,.85); }
.thumb-card .idx {
  position: absolute;
  bottom: 4px; left: 4px;
  background: rgba(0,0,0,.55);
  color: white;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
}
.image-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  max-width: 680px;
  margin-bottom: 24px;
}
.image-gallery:empty { display: none; }
.image-gallery img {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: zoom-in;
  transition: transform .2s ease;
}
.image-gallery img:hover { transform: scale(1.02); }
.image-gallery.single { grid-template-columns: 1fr; max-width: 680px; }
.image-gallery.single img { aspect-ratio: auto; max-height: 600px; object-fit: contain; }
/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 95%;
  max-height: 90%;
  border-radius: 6px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.lightbox button {
  position: absolute;
  background: rgba(255,255,255,.15);
  color: white;
  border: none;
  cursor: pointer;
}
.lightbox button:hover { background: rgba(255,255,255,.28); }
.lightbox .lb-close {
  top: 20px; right: 20px;
  width: 44px; height: 44px;
  border-radius: 999px;
  font-size: 20px;
}
.lightbox .lb-prev,
.lightbox .lb-next {
  top: 50%;
  transform: translateY(-50%);
  width: 50px; height: 50px;
  border-radius: 999px;
  font-size: 28px;
  line-height: 1;
}
.lightbox .lb-prev { left: 20px; }
.lightbox .lb-next { right: 20px; }
.lightbox .lb-counter {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,.75);
  font-size: 13px;
  font-family: 'Segoe UI', sans-serif;
  background: rgba(0,0,0,.4);
  padding: 4px 12px;
  border-radius: 999px;
}

.form-actions {
  display: flex;
  gap: 10px;
  max-width: 680px;
  padding-top: 8px;
}
.btn-save {
  background: var(--accent);
  color: #1a1510;
  border: none;
  border-radius: 6px;
  padding: 10px 24px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.btn-save:hover { background: #d9bc82; }
.btn-cancel {
  background: white;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 13px;
  cursor: pointer;
}

/* ── Count chip & Tag ─────────────────────────────────── */
.count-chip {
  display: inline-block;
  background: #ede8df;
  color: var(--sidebar-muted);
  font-size: 10px;
  border-radius: 10px;
  padding: 1px 7px;
  margin-left: 6px;
}
.folder-tag {
  background: rgba(200,169,110,0.2);
  color: var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
}

/* ── Animations & Toast ─────────────────────────────────── */
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeSlide 0.2s ease forwards; }
#toast {
  position: fixed;
  bottom: 28px;
  left: calc(var(--sidebar-w) + 32px);
  background: var(--text-main);
  color: var(--bg-light);
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  z-index: 999;
}
#toast.show { opacity: 1; }

/* ── Mode Switcher ──────────────────────────────────────── */
.mode-switcher {
  display: flex;
  padding: 10px 12px;
  gap: 6px;
  border-bottom: 1px solid var(--border-dark);
}
.mode-tab {
  flex: 1;
  background: transparent;
  color: var(--sidebar-muted);
  border: 1px solid var(--border-dark);
  border-radius: 6px;
  padding: 7px 4px;
  font-size: 11px;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-tab:hover { color: var(--sidebar-text); background: var(--sidebar-hover); }
.mode-tab.active { background: var(--sidebar-active); color: var(--accent); border-color: var(--accent-dim); }

body.reports-mode .articles-only { display: none !important; }
body:not(.reports-mode) .reports-only { display: none !important; }

/* ── Rating Badge ──────────────────────────────────────── */
.rating-badge { display:inline-block; padding:3px 10px; border-radius:4px; font-size:12px; font-weight:600; }
.r-strong-buy  { background:#c8f0da; color:#1a7a3e; }
.r-buy         { background:#d8f4e4; color:#27ae60; }
.r-neutral     { background:#ede8df; color:#7a6e62; }
.r-sell        { background:#fde8d4; color:#c05a10; }
.r-strong-sell { background:#fcd8d8; color:#c0392b; }

/* ── Report Sidebar List ───────────────────────────────── */
.report-list-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  margin-bottom: 1px;
  border: 1px solid transparent;
}
.report-list-item:hover { background: var(--sidebar-hover); }
.report-list-item.active { background: var(--sidebar-active); border-color: var(--border-dark); }
.rli-company { font-size:13px; color:var(--sidebar-text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.report-list-item.active .rli-company { color: var(--accent); }
.rli-meta { font-size:10px; color:var(--sidebar-muted); margin-top:3px; display:flex; gap:8px; align-items:center; }
.sector-tag { background:rgba(100,160,200,0.2); color:#6ab0d4; padding:2px 6px; border-radius:4px; font-size:10px; }

/* ── Report View ───────────────────────────────────────── */
#report-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  padding: 40px 48px 0;
}
.report-company-name {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  color: var(--text-main);
  line-height: 1.3;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
  flex-shrink: 0;
}
.report-ticker { font-size:14px; color:var(--text-muted); margin-bottom:20px; flex-shrink:0; }
.report-meta-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.report-content-display {
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  font-size: 15px;
  color: #3a342c;
  line-height: 1.9;
  max-width: 680px;
}
/* Markdown 渲染樣式 */
.report-content-display h1,
.report-content-display h2,
.report-content-display h3,
.report-content-display h4 {
  font-family: 'DM Serif Display', serif;
  color: var(--text-main);
  line-height: 1.3;
  margin: 1.5em 0 0.5em;
}
.report-content-display h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; }
.report-content-display h2 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.report-content-display h3 { font-size: 17px; }
.report-content-display h4 { font-size: 15px; color: var(--text-muted); }
.report-content-display p  { margin: 0 0 0.9em; }
.report-content-display strong { color: var(--text-main); font-weight: 600; }
.report-content-display em     { color: var(--text-muted); font-style: italic; }
.report-content-display ul,
.report-content-display ol  { padding-left: 1.6em; margin: 0.4em 0 0.9em; }
.report-content-display li  { margin-bottom: 0.35em; line-height: 1.8; }
.report-content-display li > ul,
.report-content-display li > ol { margin: 0.25em 0; }
.report-content-display blockquote {
  border-left: 3px solid var(--accent-dim);
  padding: 8px 16px;
  margin: 1em 0;
  color: var(--text-muted);
  background: rgba(200,169,110,0.08);
  border-radius: 0 4px 4px 0;
}
.report-content-display code {
  background: #f0ede8;
  color: #9a5c2a;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13px;
  font-family: 'Consolas', 'Monaco', monospace;
}
.report-content-display pre {
  background: #f8f5f0;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 1em 0;
}
.report-content-display pre code {
  background: none;
  padding: 0;
  color: #5a4a38;
  line-height: 1.6;
}
.report-content-display table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
  font-size: 14px;
}
.report-content-display th {
  background: #f5f0e8;
  color: var(--text-main);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 2px solid var(--accent-dim);
}
.report-content-display td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.report-content-display tr:hover td { background: rgba(0,0,0,0.02); }
.report-content-display hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.8em 0;
}
.report-content-display a {
  color: var(--accent-dim);
  text-decoration: underline;
}
#report-view-image { max-width:680px; width:100%; border-radius:8px; margin-bottom:24px; display:none; border:1px solid var(--border); }

/* ── Report Form ───────────────────────────────────────── */
#report-form { display:none; flex:1; overflow-y:auto; padding:40px 48px; }
#report-form::-webkit-scrollbar { width:5px; }
#report-form::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.form-field select {
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  font-size: 14px;
  color: var(--text-main);
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-field select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,169,110,0.12); }

/* ── Light Main Theme ───────────────────────────────────── */
#main { background: #ffffff; }

/* 工具列按鈕 */
.btn-edit, .btn-delete {
  background: white;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-edit:hover { border-color: var(--accent); color: var(--accent-dim); }
.btn-delete:hover { border-color: var(--danger); color: var(--danger); }

/* Meta 欄位 */
.article-meta-bar, .report-meta-grid { border-bottom-color: var(--border); }
.meta-label { color: var(--text-faint); }
.meta-value { color: var(--text-main); }

/* 文章 / 報告標題 */
.article-title-display { color: var(--text-main); }
.report-company-name   { color: var(--text-main); }
.report-ticker         { color: var(--text-muted); }

/* 閱讀內文 — 加寬 + Markdown 樣式 */
.article-content-display {
  color: #3a342c;
  max-width: 900px;
}
.article-content-display h1,
.article-content-display h2,
.article-content-display h3,
.article-content-display h4 {
  font-family: 'DM Serif Display', serif;
  color: var(--text-main);
  line-height: 1.3;
  margin: 1.5em 0 0.5em;
}
.article-content-display h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 0; }
.article-content-display h2 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.article-content-display h3 { font-size: 17px; }
.article-content-display h4 { font-size: 15px; color: var(--text-muted); }
.article-content-display p  { margin: 0 0 0.9em; }
.article-content-display strong { color: var(--text-main); font-weight: 600; }
.article-content-display em     { color: var(--text-muted); font-style: italic; }
.article-content-display ul,
.article-content-display ol  { padding-left: 1.6em; margin: 0.4em 0 0.9em; }
.article-content-display li  { margin-bottom: 0.35em; line-height: 1.8; }
.article-content-display li > ul,
.article-content-display li > ol { margin: 0.25em 0; }
.article-content-display blockquote {
  border-left: 3px solid var(--accent-dim);
  padding: 8px 16px;
  margin: 1em 0;
  color: var(--text-muted);
  background: rgba(200,169,110,0.08);
  border-radius: 0 4px 4px 0;
}
.article-content-display code {
  background: #f0ede8;
  color: #9a5c2a;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13px;
  font-family: 'Consolas', 'Monaco', monospace;
}
.article-content-display pre {
  background: #f8f5f0;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 1em 0;
}
.article-content-display pre code { background: none; padding: 0; color: #5a4a38; line-height: 1.6; }
.article-content-display table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 14px; }
.article-content-display th { background: #f5f0e8; color: var(--text-main); padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--accent-dim); }
.article-content-display td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.article-content-display tr:hover td { background: rgba(0,0,0,0.02); }
.article-content-display hr { border: none; border-top: 1px solid var(--border); margin: 1.8em 0; }
.article-content-display a { color: var(--accent-dim); text-decoration: underline; }
.report-content-display {
  color: #3a342c;
  max-width: 900px;
}

/* 圖片加寬 */
#view-image, #report-view-image {
  max-width: 900px;
  border-color: var(--border);
}

/* 捲軸 */
.article-scroll-body::-webkit-scrollbar-thumb { background: var(--border); }
#article-form::-webkit-scrollbar-thumb  { background: var(--border); }
#report-form::-webkit-scrollbar-thumb   { background: var(--border); }

/* 表單標題 / 標籤 */
.form-title { color: var(--text-main); }
.form-label { color: var(--text-muted); }
.btn-cancel {
  background: white;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-cancel:hover { color: var(--text-main); border-color: var(--text-faint); }

/* 歡迎畫面 */
.welcome-title { color: var(--text-muted); }
.welcome-sub   { color: var(--text-faint); }

/* ── Dark Mode ─────────────────────────────────────────────── */
body.dark {
  --bg-dark: #1c1a18; --bg-darker: #111110; --bg-light: #1e1c1a;
  --text-main: #e4ddd2; --text-muted: #9a9080; --text-faint: #6a6058;
  --border: #38342e; --border-dark: #2a2620;
  --sidebar-text: #e4ddd2; --sidebar-muted: #8a8070;
  --sidebar-hover: #252320; --sidebar-active: #2e2b26;
}
body.dark #main { background: #1e1c1a !important; }
body.dark .search-wrap { background: #1c1a18; }
body.dark .form-field input[type="text"],
body.dark .form-field input[type="date"],
body.dark .form-field textarea,
body.dark .form-field select { background: #252320 !important; color: var(--text-main); }
body.dark .btn-edit, body.dark .btn-delete, body.dark .btn-star,
body.dark .btn-duplicate, body.dark .btn-cancel { background: #252320 !important; }
body.dark .folder-modal, body.dark .tag-manager-modal { background: #252320; }
body.dark .folder-modal input, body.dark .tag-manager-input { background: #1c1a18 !important; color: var(--text-main); }
body.dark .preview-pane { background: #252320; }
body.dark .tag-row { border-bottom-color: var(--border-dark); }
body.dark .tag-row-count { background: #2a2620; }
body.dark .tag-manager-input { border-color: var(--border); }
body.dark input:-webkit-autofill, body.dark input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 30px #1c1a18 inset !important;
}

/* ── Dark toggle btn ────────────────────────────────────────── */
.btn-dark-toggle {
  background: none; border: none; font-size: 15px; cursor: pointer;
  padding: 2px 4px; border-radius: 4px; opacity: 0.55; transition: opacity 0.15s;
  line-height: 1;
}
.btn-dark-toggle:hover { opacity: 1; }

/* ── Sort dropdown ──────────────────────────────────────────── */
.sort-wrap {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px 4px;
}
.sort-wrap .sidebar-list-label {
  flex: 1; font-size: 10px; color: var(--sidebar-muted);
  letter-spacing: 0.12em; text-transform: uppercase;
}
.sort-select {
  background: transparent; border: none; font-size: 10px;
  font-family: 'Segoe UI', '微軟正黑體', sans-serif;
  color: var(--sidebar-muted); cursor: pointer; outline: none;
}
.sort-select:hover { color: var(--sidebar-text); }

/* ── Star / Duplicate buttons ───────────────────────────────── */
.btn-star, .btn-duplicate {
  background: white; border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 11px; font-size: 13px; cursor: pointer;
  color: var(--text-muted); transition: all 0.12s;
  font-family: 'Segoe UI', '微軟正黑體', sans-serif;
}
.btn-star.starred { color: #e8a020; border-color: #e8a020; background: rgba(232,160,32,0.06); }
.btn-star:hover { border-color: #e8a020; color: #e8a020; }
.btn-duplicate:hover { border-color: var(--accent); color: var(--accent-dim); }
.li-star { color: #e8a020; }

/* ── Word count ─────────────────────────────────────────────── */
.word-count-bar {
  font-size: 11px; color: var(--text-faint); padding: 0 0 12px; flex-shrink: 0;
}

/* ── Recent articles ─────────────────────────────────────────── */
.recent-section { border-top: 1px solid var(--border-dark); padding: 6px 8px 2px; }
.recent-label {
  font-size: 10px; color: var(--sidebar-muted); letter-spacing: 0.12em;
  text-transform: uppercase; padding: 2px 6px 3px; display: block;
}
.recent-item {
  font-size: 11px; color: var(--sidebar-text); padding: 4px 8px; border-radius: 4px;
  cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.75;
}
.recent-item:hover { background: var(--sidebar-hover); opacity: 1; }

/* ── Tag manager ─────────────────────────────────────────────── */
.tag-manager-modal {
  background: white; border-radius: 12px; padding: 28px 32px; width: 480px;
  max-height: 72vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18); animation: fadeSlide 0.18s ease forwards;
}
.tag-manager-list { flex: 1; overflow-y: auto; margin: 14px 0 18px; }
.tag-manager-list::-webkit-scrollbar { width: 4px; }
.tag-manager-list::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }
.tag-row {
  display: flex; align-items: center; gap: 8px; padding: 7px 4px;
  border-bottom: 1px solid var(--border);
}
.tag-row:last-child { border-bottom: none; }
.tag-row-name { flex: 1; font-size: 13px; color: var(--text-main); }
.tag-row-count { font-size: 10px; color: var(--sidebar-muted); background: #ede8df; padding: 1px 7px; border-radius: 10px; }
.tag-manager-input {
  font-family: 'Segoe UI', '微軟正黑體', sans-serif; font-size: 13px; color: var(--text-main);
  background: white; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px;
  outline: none; width: 140px;
}
.tag-manager-input:focus { border-color: var(--accent); }
.tag-btn-sm {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--text-muted);
  font-family: 'Segoe UI', '微軟正黑體', sans-serif;
}
.tag-btn-sm:hover { border-color: var(--accent); color: var(--accent-dim); }
.tag-btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }

/* ── Live preview ─────────────────────────────────────────────── */
.preview-toggle {
  background: transparent; border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 8px; font-size: 11px; color: var(--sidebar-muted); cursor: pointer;
  font-family: 'Segoe UI', '微軟正黑體', sans-serif;
}
.preview-toggle.active { border-color: var(--accent-dim); color: var(--accent-dim); }
.form-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 100%; }
.preview-pane {
  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px;
  min-height: 240px; background: white; overflow-y: auto;
  font-family: 'Segoe UI', '微軟正黑體', sans-serif; font-size: 14px;
  line-height: 1.8; color: var(--text-main);
}

/* ── Folder Modal ──────────────────────────────────────────── */
.folder-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.folder-modal-overlay.show { display: flex; }
.folder-modal {
  background: white;
  border-radius: 12px;
  padding: 28px 32px;
  width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  animation: fadeSlide 0.18s ease forwards;
}
.folder-modal-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text-main);
  margin-bottom: 18px;
}
.folder-modal input {
  width: 100%;
  font-family: 'Segoe UI', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  font-size: 14px;
  color: var(--text-main);
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  outline: none;
  margin-bottom: 20px;
}
.folder-modal input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
}
.folder-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ── Keyword tag chip ──────────────────────────────────────── */
.kw-chip {
  display: inline-block;
  background: rgba(200,169,110,0.13);
  color: var(--accent-dim);
  border: 1px solid rgba(200,169,110,0.25);
  padding: 2px 9px;
  border-radius: 999px;
  font-size: 12px;
  margin: 2px 3px 2px 0;
}
.li-kw-chip {
  display: inline-block;
  background: rgba(200,169,110,0.12);
  color: var(--accent-dim);
  padding: 1px 6px;
  border-radius: 999px;
  font-size: 10px;
}

/* ── Rename folder button ─────────────────────────────────── */
.folder-tab-rename {
  display: none;
  background: none;
  border: none;
  color: var(--sidebar-muted);
  cursor: pointer;
  font-size: 13px;
  padding: 0 2px;
  margin-left: 1px;
}
.folder-tab:hover .folder-tab-rename { display: inline-block; }
.folder-tab-rename:hover { color: var(--accent); }

/* 抑制瀏覽器/擴充套件注入的填入圖示 */
input::-webkit-contacts-auto-fill-button,
input::-webkit-credentials-auto-fill-button,
input::-webkit-clear-button,
input::-ms-clear,
input::-ms-reveal { visibility: hidden; width: 0; height: 0; pointer-events: none; }

/* 修補 Chrome/Edge autofill 背景 */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 30px #f0ede8 inset !important;
  -webkit-text-fill-color: var(--sidebar-text) !important;
  caret-color: var(--sidebar-text);
  transition: background-color 9999s ease-in-out 0s;
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-brand">
    <div>
      <div class="brand-title" id="brand-title">文章資料庫</div>
      <div class="brand-sub" id="brand-sub">Article Archive</div>
    </div>
    <button class="btn-dark-toggle" id="dark-toggle" onclick="toggleDarkMode()" title="深色／淺色模式">🌙</button>
  </div>

  <div class="mode-switcher">
    <button class="mode-tab active" id="tab-articles" onclick="switchMode('articles')">📚 文章庫</button>
    <button class="mode-tab" id="tab-reports" onclick="switchMode('reports')">🏢 公司報告</button>
  </div>

  <!-- ── 文章庫區塊 ── -->
  <div class="articles-only" style="display:contents">
    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="搜尋文章、作者…" oninput="renderList()">
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="showForm()">＋ 新增文章</button>
      <button class="btn-new-folder" onclick="addFolder()">＋ 新增資料夾</button>
    </div>
    <div class="folder-tabs" id="folder-tabs"></div>
    <div class="sort-wrap">
      <span class="sidebar-list-label" id="list-header-label">所有文章</span>
      <select class="sort-select" id="sort-select" onchange="renderList()">
        <option value="newest">最新</option>
        <option value="oldest">最舊</option>
        <option value="title">標題 A-Z</option>
        <option value="author">作者 A-Z</option>
      </select>
      <span class="count-chip" id="count-chip">0</span>
    </div>
    <div id="article-list" style="flex:1;overflow-y:auto;padding:0 8px 16px;"></div>
    <div class="recent-section" id="recent-section" style="display:none">
      <span class="recent-label">最近閱讀</span>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- ── 公司報告區塊 ── -->
  <div class="reports-only" style="display:contents">
    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="report-search-input" type="text" placeholder="搜尋公司、產業…" oninput="renderReportList()">
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="showReportForm()">＋ 新增報告</button>
    </div>
    <div id="report-sector-tabs" class="folder-tabs"></div>
    <div class="sidebar-list-header">
      <span id="report-list-header-label">所有報告</span> <span class="count-chip" id="report-count-chip">0</span>
    </div>
    <div id="report-list" style="flex:1;overflow-y:auto;padding:0 8px 16px;"></div>
  </div>

  <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:5px;">
    <div class="articles-only" style="display:flex;gap:5px;">
      <button class="btn-export" style="flex:1" onclick="exportJSON()">↓ 備份 JSON</button>
      <button class="btn-export" style="flex:1" onclick="importJSON()">↑ 還原 JSON</button>
    </div>
    <button class="btn-export articles-only" onclick="exportCSV()">↓ 匯出 CSV</button>
    <button class="btn-export articles-only" style="color:var(--accent-dim);border-color:var(--accent-dim)" onclick="openTagManager()">🏷 管理標籤</button>
    <button class="btn-export reports-only" onclick="exportReportsCSV()">↓ 匯出報告 CSV</button>
  </div>
</div>

<div id="sidebar-resizer" title="拖曳可調整寬度・雙擊還原"></div>

<div id="main">
  <div id="content-area">

    <div id="welcome-screen">
      <div class="welcome-icon">📚</div>
      <div class="welcome-title">文章資料庫</div>
      <div class="welcome-sub">點擊左側文章閱讀，或按「＋ 新增文章」開始記錄</div>
    </div>

    <div id="article-view">
      <div class="article-toolbar">
        <button class="btn-edit" onclick="showForm(currentId)">✎ 編輯</button>
        <button class="btn-delete" onclick="deleteArticle(currentId)">✕ 刪除</button>
        <button class="btn-star" id="btn-star" onclick="toggleStar(currentId)">☆ 收藏</button>
        <button class="btn-duplicate" onclick="duplicateArticle(currentId)">⎘ 複製</button>
      </div>
      <div class="word-count-bar" id="word-count-bar"></div>
      <div class="article-meta-bar">
        <div class="meta-item">
          <span class="meta-label">資料夾</span>
          <span class="meta-value" id="view-folder">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">作者</span>
          <span class="meta-value" id="view-author">—</span>

marked.setOptions({ breaks: true, gfm: true });

// ── API 設定（部署到 Railway 後填入網址）────────────────────
const API_BASE = 'https://web-production-2210c.up.railway.app';
let folderCatMap = {};  // folder name → category id

function _parseImages(raw) { try { return JSON.parse(raw || '[]'); } catch { return []; } }

  return {
    id: r.id, title: r.title, content: r.content || '',
    author: r.author || '', date: r.date || '', source: r.source || '',
    folder: r.category_name || '',

    tags: r.tags || [],
    starred: r.starred || 0
  };

function _apiToReport(r) {
  return {
    id: r.id, company: r.company, ticker: r.ticker || '',
    sector: r.sector || '', rating: r.rating || '', target: r.target || '',
    date: r.date || '', analyst: r.analyst || '', source: r.source || '',
    content: r.content || '', images: _parseImages(r.images), image: ''
  };
}

let articles = [];
let folders  = [];
let currentId = null;
let editingId = null;
let currentFolder = '';   // '' = 所有文章, '__uncat__' = 未分類
let uploadedImages = [];  // base64[] for current article form

// ── Image helpers ─────────────────────────────────────────────
// 把每張圖片用 Canvas 縮到 maxW 寬度並輸出為 JPEG/PNG dataURL
function compressImage(file, maxW = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('FileReader error'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Image decode error'));
      img.onload = () => {
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        // 白底（避免 JPEG 把透明變黑）
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        // PNG 帶透明（小檔），其餘一律 JPEG（壓縮率高）
        const mime = (file.type === 'image/png' && file.size < 200_000) ? 'image/png' : 'image/jpeg';
        resolve(canvas.toDataURL(mime, quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function compressFiles(fileList) {
  const results = [];
  for (const f of Array.from(fileList || [])) {
    if (!f.type || !f.type.startsWith('image/')) continue;
    try { results.push(await compressImage(f)); }
    catch (err) { console.warn('壓縮失敗', f.name, err); }
  }
  return results;
}

// 取出文章/報告的圖片陣列（向後相容舊版單一 image 欄位）
function getImages(obj) {
  if (Array.isArray(obj.images)) return obj.images;
  if (obj.image) return [obj.image];
  return [];
}

async function _apiCreateFolder(name) {
  const cat = await fetch(`${API_BASE}/categories`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name })
  }).then(r => r.json());
  folderCatMap[name] = cat.id;
  if (!folders.includes(name)) folders.push(name);
  return cat.id;
}

// ── 文章圖片上傳（多張、自動壓縮） ─────────────────────────────
document.getElementById('f-image').addEventListener('change', async function(e) {
  const files = e.target.files;
  if (!files || !files.length) return;
  toast(`處理 ${files.length} 張圖片中…`);
  try {
    const compressed = await compressFiles(files);
    uploadedImages.push(...compressed);
    toast(`已加入 ${compressed.length} 張`);
  } catch (err) {
    toast('部分圖片處理失敗');
    console.error(err);
  }
  e.target.value = '';   // 允許再次選擇相同檔案
  renderFormImagePreviews();
});

function renderFormImagePreviews() {
  const c = document.getElementById('form-image-previews');
  if (!c) return;
  c.innerHTML = uploadedImages.map((src, i) => `
    <div class="thumb-card">
      <img src="${src}" alt="圖片 ${i+1}" onclick="openLightbox(uploadedImages, ${i})">
      <span class="idx">${i+1}</span>
      <button type="button" class="x" onclick="removeImageAt(${i})" title="移除這張">×</button>
    </div>
  `).join('');
  document.getElementById('btn-remove-img').style.display = uploadedImages.length ? 'inline-block' : 'none';
}

function removeImageAt(i) {
  uploadedImages.splice(i, 1);
  renderFormImagePreviews();
}

function clearImages(e) {
  if (e) e.preventDefault();
  uploadedImages = [];
  document.getElementById('f-image').value = '';
  renderFormImagePreviews();
}

async function _apiPost(path, body) {
  return fetch(`${API_BASE}${path}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(r => r.json());
}
async function _apiPatch(path, body) {
  return fetch(`${API_BASE}${path}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(r => r.json());
}
async function _apiDelete(path) {
  return fetch(`${API_BASE}${path}`, { method: 'DELETE' });
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

// ── 資料夾標籤渲染 ──────────────────────────────────────────
function renderFolders() {
  const container = document.getElementById('folder-tabs');
  const datalist  = document.getElementById('folder-datalist');
  const allCount  = articles.length;
  const uncatCount = articles.filter(a => !a.folder).length;

  let html = `
    <div class="folder-tab ${currentFolder === '' ? 'active' : ''}" data-folder="">
      <span class="folder-tab-icon">📚</span>
      <span class="folder-tab-name">所有文章</span>
      <span class="folder-tab-count">${allCount}</span>
    </div>`;

  folders.forEach(f => {
    const count = articles.filter(a => a.folder === f).length;
    html += `
    <div class="folder-tab ${currentFolder === f ? 'active' : ''}" data-folder="${esc(f)}">
      <span class="folder-tab-icon">📁</span>
      <span class="folder-tab-name">${esc(f)}</span>
      <span class="folder-tab-count">${count}</span>
      <button class="folder-tab-rename" data-rename="${esc(f)}" title="重新命名">✎</button>
      <button class="folder-tab-delete" data-del="${esc(f)}" title="刪除資料夾">✕</button>
    </div>`;
  });

  if (uncatCount > 0) {
    html += `
    <div class="folder-tab ${currentFolder === '__uncat__' ? 'active' : ''}" data-folder="__uncat__">
      <span class="folder-tab-icon">📂</span>
      <span class="folder-tab-name">未分類</span>
      <span class="folder-tab-count">${uncatCount}</span>
    </div>`;
  }
  const starredCount = articles.filter(a => a.starred).length;
  if (starredCount > 0) {
    html += `
    <div class="folder-tab ${currentFolder === '__starred__' ? 'active' : ''}" data-folder="__starred__">
      <span class="folder-tab-icon">⭐</span>
      <span class="folder-tab-name">收藏</span>
      <span class="folder-tab-count">${starredCount}</span>
    </div>`;
  }

  container.innerHTML = html;

  container.querySelectorAll('.folder-tab').forEach(tab => {
    tab.addEventListener('click', () => selectFolder(tab.dataset.folder));
  });
  container.querySelectorAll('.folder-tab-rename').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); renameFolder(btn.dataset.rename); });
  });
  container.querySelectorAll('.folder-tab-delete').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteFolder(btn.dataset.del); });
  });

  datalist.innerHTML = folders.map(f => `<option value="${esc(f)}">`).join('');
}

function selectFolder(name) {
  currentFolder = name;
  currentTag = '';
  const labels = { '': '所有文章', '__uncat__': '未分類', '__starred__': '收藏' };
  document.getElementById('list-header-label').textContent = labels[name] ?? name;
  renderList();
}

function addFolder() {
  openFolderModal('add', '');
}

let _folderModalMode = 'add';
let _folderModalOldName = '';

function openFolderModal(mode, oldName) {
  _folderModalMode = mode;
  _folderModalOldName = oldName || '';
  document.getElementById('folder-modal-title').textContent = mode === 'rename' ? '重新命名資料夾' : '新增資料夾';
  const inp = document.getElementById('folder-modal-input');
  inp.value = oldName || '';
  document.getElementById('folder-modal-overlay').classList.add('show');
  setTimeout(() => inp.focus(), 50);
}

function closeFolderModal() {
  document.getElementById('folder-modal-overlay').classList.remove('show');
}

async function confirmFolderModal() {
  const val = document.getElementById('folder-modal-input').value.trim();
  if (!val) { document.getElementById('folder-modal-input').focus(); return; }
  closeFolderModal();

  if (_folderModalMode === 'add') {
    if (folders.includes(val)) { toast('此資料夾已存在'); return; }
    await _apiCreateFolder(val);
    toast(`資料夾「${val}」已建立`);
    renderFolders();
    renderList();
  } else {
    if (val === _folderModalOldName) return;
    if (folders.includes(val)) { toast('此資料夾名稱已存在'); return; }
    const id = folderCatMap[_folderModalOldName];
    if (id) await _apiPatch(`/categories/${id}`, { name: val });
    delete folderCatMap[_folderModalOldName];
    folderCatMap[val] = id;
    const idx = folders.indexOf(_folderModalOldName);
    if (idx >= 0) folders[idx] = val;
    articles.forEach(a => { if (a.folder === _folderModalOldName) a.folder = val; });
    if (currentFolder === _folderModalOldName) {
      currentFolder = val;
      document.getElementById('list-header-label').textContent = val;
    }
    toast(`資料夾已重新命名為「${val}」`);
    renderFolders();
    renderList();
  }
}

function renameFolder(name) {
  openFolderModal('rename', name);
}

async function deleteFolder(name) {
  const count = articles.filter(a => a.folder === name).length;
  const msg = count > 0
    ? `確定要刪除資料夾「${name}」嗎？\n其中 ${count} 篇文章將變為未分類。`
    : `確定要刪除資料夾「${name}」嗎？`;
  if (!confirm(msg)) return;
  const id = folderCatMap[name];
  if (id) await _apiDelete(`/categories/${id}`);
  delete folderCatMap[name];
  folders = folders.filter(f => f !== name);
  articles.forEach(a => { if (a.folder === name) a.folder = ''; });
  if (currentFolder === name) currentFolder = '';
  document.getElementById('list-header-label').textContent = '所有文章';
  toast(`資料夾「${name}」已刪除`);
  renderList();
}

// ── 文章列表渲染 ─────────────────────────────────────────────
function renderList() {
  renderFolders();

  const q    = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('article-list');
  const chip = document.getElementById('count-chip');

  const filtered = articles.filter(a => {
    const matchSearch = !q ||
      a.title.toLowerCase().includes(q) ||
      (a.author||'').toLowerCase().includes(q) ||
      (a.source||'').toLowerCase().includes(q) ||
      (a.content||'').toLowerCase().includes(q) ||
      (a.tags||[]).some(t => t.toLowerCase().includes(q));
    let matchFolder;
    if (currentFolder === '')               matchFolder = true;
    else if (currentFolder === '__uncat__') matchFolder = !a.folder;
    else if (currentFolder === '__starred__') matchFolder = !!a.starred;
    else                                    matchFolder = a.folder === currentFolder;
    const matchTag = !currentTag || (a.tags||[]).includes(currentTag);
    return matchSearch && matchFolder && matchTag;
  });

  const sortMode = document.getElementById('sort-select')?.value || 'newest';
  let toRender = filtered.slice();
  if      (sortMode === 'oldest') toRender.reverse();
  else if (sortMode === 'title')  toRender.sort((a,b) => a.title.localeCompare(b.title, 'zh'));
  else if (sortMode === 'author') toRender.sort((a,b) => (a.author||'').localeCompare(b.author||'', 'zh'));

  chip.textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-list">${(q || currentFolder) ? '沒有符合的文章' : '尚無文章<br>按上方按鈕新增'}</div>`;
    return;
  }

  list.innerHTML = toRender.map(a => `
    <div class="list-item ${a.id === currentId ? 'active' : ''}" onclick="viewArticle(${a.id})">
      <div class="li-title">
        ${a.starred ? '<span class="li-star">★</span> ' : ''}${esc(a.title)}
      </div>
      <div class="li-meta">
        ${a.folder ? `<span class="folder-tag">${esc(a.folder)}</span>` : ''}
        <span>${esc(a.author || '未知作者')}</span>

// 渲染檢視頁的圖片畫廊（支援單張/多張，多張自動 grid，點圖開 lightbox）
const _galleries = {};   // containerId -> images[]
function renderViewGallery(containerId, images) {
  const el = document.getElementById(containerId);
  if (!el) return;
  _galleries[containerId] = images;
  if (!images.length) { el.innerHTML = ''; el.classList.remove('single'); return; }
  el.classList.toggle('single', images.length === 1);
  el.innerHTML = images.map((_, i) =>
    `<img data-gallery="${containerId}" data-i="${i}" alt="附圖 ${i+1}">`
  ).join('');
  // 用 dataset 取出 src，避免在 attribute 內塞 base64 造成解析慢
  el.querySelectorAll('img').forEach((img, i) => {
    img.src = images[i];
    img.addEventListener('click', () => openLightbox(images, i));
  });
}

function exportCSV() {
  if (!articles.length) { toast('尚無文章可匯出'); return; }
  const rows = [['編號', '資料夾', '文章名稱', '作者', '日期', '來源', '文章內容']];
  articles.forEach((a, i) => {
    rows.push([i+1, a.folder||'', a.title, a.author||'', a.date||'', a.source||'', (a.content||'').replace(/\n/g, ' ')]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '文章資料庫.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('匯出完成');
}

// ── Lightbox ────────────────────────────────────────────────
let _lbImages = [];
let _lbIndex = 0;
function openLightbox(images, index) {
  if (!images || !images.length) return;
  _lbImages = images;
  _lbIndex = index || 0;
  const lb = document.getElementById('lightbox');
  document.getElementById('lb-img').src = _lbImages[_lbIndex];
  document.getElementById('lb-counter').textContent = `${_lbIndex+1} / ${_lbImages.length}`;
  document.querySelectorAll('.lb-prev, .lb-next').forEach(b => b.style.display = _lbImages.length > 1 ? 'block' : 'none');
  lb.classList.add('show');
}
function closeLightbox(e) {
  if (e && e.target && e.target.tagName === 'IMG') return;
  document.getElementById('lightbox').classList.remove('show');
}
function lbNav(delta, e) {
  if (e) e.stopPropagation();
  if (!_lbImages.length) return;
  _lbIndex = (_lbIndex + delta + _lbImages.length) % _lbImages.length;
  document.getElementById('lb-img').src = _lbImages[_lbIndex];
  document.getElementById('lb-counter').textContent = `${_lbIndex+1} / ${_lbImages.length}`;
}
// 點背景關閉

// ── Keyboard shortcuts ────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Folder modal 優先
  if (document.getElementById('folder-modal-overlay').classList.contains('show')) return;
  // Lightbox 控制優先
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('show')) {
    if (e.key === 'Escape')      { closeLightbox(); return; }
    if (e.key === 'ArrowLeft')   { lbNav(-1); return; }
    if (e.key === 'ArrowRight')  { lbNav( 1); return; }
  }
  const isReports = document.body.classList.contains('reports-mode');
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    isReports ? showReportForm() : showForm();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('article-form').style.display !== 'none') cancelForm();
    if (document.getElementById('report-form').style.display  !== 'none') cancelReportForm();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('article-form').style.display !== 'none') saveArticle();
    if (document.getElementById('report-form').style.display  !== 'none') saveReport();
  }
});

// ── 側欄寬度可調整 ────────────────────────────────────────────
(function setupSidebarResize() {
  const SIDEBAR_MIN = 200;
  const SIDEBAR_MAX = 600;
  const SIDEBAR_DEFAULT = 280;
  const KEY = 'sidebar_width';

  const root = document.documentElement;
  const resizer = document.getElementById('sidebar-resizer');
  if (!resizer) return;

  // 載入儲存的寬度
  const saved = parseInt(localStorage.getItem(KEY), 10);
  if (saved >= SIDEBAR_MIN && saved <= SIDEBAR_MAX) {
    root.style.setProperty('--sidebar-w', saved + 'px');
  }

  let dragging = false;
  function onPointerDown(e) {
    dragging = true;
    resizer.classList.add('dragging');
    document.body.classList.add('resizing');
    e.preventDefault();
  }
  function onPointerMove(e) {
    if (!dragging) return;
    let w = e.clientX;
    if (w < SIDEBAR_MIN) w = SIDEBAR_MIN;
    if (w > SIDEBAR_MAX) w = SIDEBAR_MAX;
    root.style.setProperty('--sidebar-w', w + 'px');
  }
  function onPointerUp() {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.classList.remove('resizing');
    const cur = getComputedStyle(root).getPropertyValue('--sidebar-w').trim();
    const px = parseInt(cur, 10);
    if (px) localStorage.setItem(KEY, px);
  }
  function onDoubleClick() {
    root.style.setProperty('--sidebar-w', SIDEBAR_DEFAULT + 'px');
    localStorage.setItem(KEY, SIDEBAR_DEFAULT);
    toast('側欄寬度已重置');
  }

  resizer.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  resizer.addEventListener('dblclick', onDoubleClick);
})();

// ── Dark mode ─────────────────────────────────────────────────
let darkMode = localStorage.getItem('darkMode') === '1';
function toggleDarkMode() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-toggle').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('darkMode', darkMode ? '1' : '0');
}
if (darkMode) {
  document.body.classList.add('dark');
  document.getElementById('dark-toggle').textContent = '☀️';
}

// ── Tag filter ─────────────────────────────────────────────────
let currentTag = '';
function filterByTag(tag) {
  currentTag = (currentTag === tag) ? '' : tag;
  document.getElementById('list-header-label').textContent =
    currentTag ? `#${currentTag}` : (currentFolder === '' ? '所有文章' : (currentFolder === '__uncat__' ? '未分類' : (currentFolder === '__starred__' ? '收藏' : currentFolder)));
  renderList();
}

// ── Star / favourite ──────────────────────────────────────────
async function toggleStar(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  const newVal = a.starred ? 0 : 1;
  await _apiPatch(`/articles/${id}`, { starred: newVal });
  a.starred = newVal;
  const btn = document.getElementById('btn-star');
  if (btn) { btn.classList.toggle('starred', !!newVal); btn.textContent = newVal ? '★ 已收藏' : '☆ 收藏'; }
  renderList();
}

// ── Duplicate article ─────────────────────────────────────────
async function duplicateArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  if (a.folder && !folders.includes(a.folder)) await _apiCreateFolder(a.folder);
  const res = await _apiPost('/articles', {
    title: `${a.title}（複製）`, content: a.content || '',
    author: a.author || null, source: a.source || null, language: 'zh',
    category_id: folderCatMap[a.folder] || null, date: a.date || null,
    images: JSON.stringify(a.images || []), tags: a.tags || [], starred: 0
  });
  const newArt = _apiToArticle({ ...res, tags: a.tags || [] });
  articles.unshift(newArt);
  toast('文章已複製');
  viewArticle(res.id);
  renderList();
}

// ── Recent articles ───────────────────────────────────────────
const RECENT_KEY = 'recent_articles';
function addToRecent(id) {
  let r = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  r = [id, ...r.filter(x => x !== id)].slice(0, 5);
  localStorage.setItem(RECENT_KEY, JSON.stringify(r));
  renderRecent();
}
function renderRecent() {
  const section = document.getElementById('recent-section');
  const list = document.getElementById('recent-list');
  if (!section || !list) return;
  const ids = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]').filter(id => articles.find(a => a.id === id));
  if (!ids.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  list.innerHTML = ids.map(id => {
    const a = articles.find(x => x.id === id);
    return `<div class="recent-item" onclick="viewArticle(${id})">${esc(a.title)}</div>`;
  }).join('');
}

// ── Tag manager ───────────────────────────────────────────────
async function openTagManager() {
  await renderTagManager();
  document.getElementById('tag-manager-overlay').classList.add('show');
}
function closeTagManager() {
  document.getElementById('tag-manager-overlay').classList.remove('show');
}
async function renderTagManager() {
  const list = document.getElementById('tag-manager-list');
  let tags = [];
  try { tags = await fetch(`${API_BASE}/tags`).then(r => r.json()); } catch(e) {}
  if (!tags.length) {
    list.innerHTML = '<div style="color:var(--text-faint);font-size:13px;padding:8px 4px;">尚無標籤</div>';
    return;
  }
  list.innerHTML = tags.map(t => `
    <div class="tag-row">
      <input class="tag-manager-input" id="tag-input-${t.id}" value="${esc(t.name)}">
      <span class="tag-row-count">${t.count} 篇</span>
      <button class="tag-btn-sm" onclick="saveTagName(${t.id}, '${esc(t.name)}')">儲存</button>
      <button class="tag-btn-sm danger" onclick="deleteTagById(${t.id}, '${esc(t.name)}')">✕</button>
    </div>`).join('');
}
async function saveTagName(tid, oldName) {
  const newName = document.getElementById(`tag-input-${tid}`).value.trim();
  if (!newName || newName === oldName) return;
  await _apiPatch(`/tags/${tid}`, { name: newName });
  articles.forEach(a => { const i = (a.tags||[]).indexOf(oldName); if (i >= 0) a.tags[i] = newName; });
  toast('標籤已更新'); renderList(); await renderTagManager();
}
async function deleteTagById(tid, name) {
  if (!confirm(`確定要刪除標籤「${name}」嗎？`)) return;
  await _apiDelete(`/tags/${tid}`);
  articles.forEach(a => { a.tags = (a.tags||[]).filter(t => t !== name); });
  toast('標籤已刪除'); renderList(); await renderTagManager();
}
document.getElementById('tag-manager-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTagManager();
});

// ── Live preview ──────────────────────────────────────────────
let previewOn = false;
function togglePreview() {
  previewOn = !previewOn;
  const btn  = document.getElementById('preview-toggle');
  const wrap = document.getElementById('content-wrap');
  const ta   = document.getElementById('f-content');
  const field = document.getElementById('content-field');
  btn.classList.toggle('active', previewOn);
  if (previewOn) {
    wrap.className = 'form-split';
    field.style.maxWidth = 'none';
    const pane = document.createElement('div');
    pane.className = 'preview-pane article-content-display';
    pane.id = 'preview-pane';
    pane.innerHTML = marked.parse(ta.value || '');
    wrap.appendChild(pane);
    ta.addEventListener('input', updatePreview);
  } else {
    wrap.className = '';
    field.style.maxWidth = '680px';
    const pane = document.getElementById('preview-pane');
    if (pane) pane.remove();
    ta.removeEventListener('input', updatePreview);
  }
}
function updatePreview() {
  const pane = document.getElementById('preview-pane');
  if (pane) pane.innerHTML = marked.parse(document.getElementById('f-content').value || '');
}

// ── Backup / Restore JSON ─────────────────────────────────────
function exportJSON() {
  if (!articles.length) { toast('尚無文章可備份'); return; }
  const blob = new Blob([JSON.stringify({ version: 1, exported: new Date().toISOString(), articles }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `文章備份_${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('備份完成');
}
function importJSON() { document.getElementById('json-import-input').click(); }
document.getElementById('json-import-input').addEventListener('change', async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    const arts = data.articles || data;
    if (!Array.isArray(arts)) { toast('JSON 格式不正確'); return; }
    toast(`匯入 ${arts.length} 篇文章中…`);
    let count = 0;
    for (const a of arts) {
      const folder = a.folder || '';
      if (folder && !folders.includes(folder)) await _apiCreateFolder(folder);
      const res = await _apiPost('/articles', {
        title: a.title || '未命名', content: a.content || '',
        author: a.author || null, source: a.source || null, language: 'zh',
        category_id: folderCatMap[folder] || null, date: a.date || null,
        images: JSON.stringify(a.images || []), tags: a.tags || [], starred: a.starred || 0
      });
      articles.unshift(_apiToArticle({ ...res, tags: a.tags || [] }));
      count++;
    }
    toast(`已匯入 ${count} 篇文章`);
    renderFolders(); renderList();
    if (articles.length) viewArticle(articles[0].id);
  } catch(err) { toast('匯入失敗：' + err.message); }
  e.target.value = '';
});

async function initData() {
  const sub = document.querySelector('.welcome-sub');
  if (sub) sub.textContent = '載入資料中…';
  try {
    const [arts, cats, reps] = await Promise.all([
      fetch(`${API_BASE}/articles?limit=500`).then(r => r.json()),
      fetch(`${API_BASE}/categories`).then(r => r.json()),
      fetch(`${API_BASE}/reports?limit=500`).then(r => r.json())
    ]);

    folderCatMap = {};
    folders = [];
    (function flat(nodes) {
      nodes.forEach(c => {
        folderCatMap[c.name] = c.id;
        folders.push(c.name);
        if (c.children && c.children.length) flat(c.children);
      });
    })(cats);

    articles = arts.map(_apiToArticle);
    reports  = reps.map(_apiToReport);

    renderList();
    renderReportList();
    renderRecent();

    if (articles.length) viewArticle(articles[0].id);
    else {
      document.getElementById('welcome-screen').style.display = 'flex';
      if (sub) sub.textContent = '點擊左側文章閱讀，或按「＋ 新增文章」開始記錄';
    }
  } catch(e) {
    console.error('initData error', e);
    document.getElementById('welcome-screen').style.display = 'flex';
    if (sub) sub.textContent = '⚠️ 無法連接伺服器，請確認 API_BASE 設定正確';
  }
}

initData();
</script>
